<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Câmera Nilópolis</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe 
        src="https://weekly-events-tourism-reduce.trycloudflare.com/video.html?src=cam1&mode=hls&autoplay=1&mute=1" 
        allow="autoplay; fullscreen">
    </iframe>

    <script>
        // Esse código é o que faz o Android mostrar o botão de INSTALAR
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("PWA Ativo!"))
            .catch(err => console.log("Erro no PWA:", err));
        }
    </script>
</body>
</html>
