<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Nilópolis</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; 
            color: white; 
            font-family: Arial, sans-serif;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .container { width: 90%; max-width: 800px; text-align: center; }
        video { 
            width: 100%; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }
        h1 { font-size: 1.2rem; margin-bottom: 15px; color: #4CAF50; }
        .status { margin-top: 10px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Câmera em Tempo Real</h1>
        
        <video id="videoPlayer" autoplay controls playsinline muted>
            <source src="http://192.168.1.154:1984/api/stream.mp4?src=camera1" type="video/mp4">
            Seu navegador não suporta o vídeo.
        </video>

        <div class="status">Conectado via Rede Local</div>
    </div>

    <script>
        // Tenta dar play automático (iPhone exige interação ou muted)
        const video = document.getElementById('videoPlayer');
        video.addEventListener('loadedmetadata', () => {
            video.play().catch(e => console.log("Play automático bloqueado: ", e));
        });
    </script>
</body>
</html>
