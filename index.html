<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Câmera Nilópolis</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <video id="cameraPlayer" autoplay playsinline muted loop>
        <source src="https://weekly-events-tourism-reduce.trycloudflare.com/api/stream.mp4?src=cam1" type="video/mp4">
        Seu navegador não suporta este vídeo.
    </video>

    <script>
        // Força o play caso o navegador tente bloquear
        const player = document.getElementById('cameraPlayer');
        player.play().catch(() => {
            console.log("Autoplay bloqueado, tentando novamente...");
            // Tenta dar play de novo após 1 segundo
            setTimeout(() => player.play(), 1000);
        });

        // Registro do Service Worker para o PWA funcionar no Android
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
